  - generic [ref=e55]:
    - generic [ref=e56]: // What it does
    - heading "SRE intelligence, built into Claude Code" [level=2] [ref=e57]
    - paragraph [ref=e58]: Not a chatbot. A structured mental model — the way a seasoned Linux administrator thinks when something breaks at 2 AM.
    - generic [ref=e59]:
      - generic [ref=e60]:
        - generic [ref=e61]: 🔍
        - generic [ref=e62]: Read-only-first diagnostics
        - paragraph [ref=e63]: Gathers evidence before touching anything. Follows the observe → hypothesize → verify → fix loop every senior SRE uses. No destructive action runs before you have a diagnosis.
      - generic [ref=e64]:
        - generic [ref=e65]: 🐧
        - generic [ref=e66]: Distro-aware command selection
        - paragraph [ref=e67]: Detects Ubuntu, RHEL, Fedora, SUSE, Arch. Uses the right package manager and service manager for each.
      - generic [ref=e68]:
        - generic [ref=e69]: 🛡️
        - generic [ref=e70]: Safety gates on destructive commands
        - paragraph [ref=e71]: PreToolUse hook classifies every command. Class 3 (rm -rf, dd, mkfs) is blocked. Class 2 requires explicit confirmation.
      - generic [ref=e72]:
        - generic [ref=e73]: 🎯
        - generic [ref=e74]: Evidence-based root-cause analysis
        - paragraph [ref=e75]: No guessing. Chases the error through logs, service dependencies, kernel messages, and config files.
      - generic [ref=e76]:
        - generic [ref=e77]: ⚡
        - generic [ref=e78]: 98 task-specific skills
        - paragraph [ref=e79]: Expert modules for sysctl, systemd, nftables, LVM, kdump, SSSD, PAM, ACLs, and more.
      - generic [ref=e80]:
        - generic [ref=e81]: 🤖
        - generic [ref=e82]: Multi-agent platform support
        - paragraph [ref=e83]: Claude Code native. Adapters for Codex (AGENTS.md) and Gemini (GEMINI.md) included. Works wherever your AI agent runs.
  - region "Safety model" [ref=e84]:
    - generic [ref=e85]:
      - generic [ref=e86]: // Command safety
      - heading "Three-class protection model" [level=2] [ref=e87]
      - paragraph [ref=e88]: Every shell command passes through a classification gate before execution. No exceptions.
      - generic [ref=e89]:
        - generic [ref=e90]:
          - generic [ref=e91]: Class R/O
          - generic [ref=e92]: Read-only — instant pass
          - paragraph [ref=e93]: Diagnostic commands run immediately with zero friction. Evidence collection has no gating.
          - generic [ref=e94]: cat · journalctl · systemctl status · ss · ip · df · du · ps · lsof · dmesg
        - generic [ref=e95]:
          - generic [ref=e96]: Class 2
          - generic [ref=e97]: Disruptive — confirm required
          - paragraph [ref=e98]: Command halts. Warning is shown. User must type 'yes' to proceed. Never skipped.
          - generic [ref=e99]: systemctl stop · systemctl restart · firewall-cmd · sysctl -w · mount · iptables -A
        - generic [ref=e100]:
          - generic [ref=e101]: Class 3
          - generic [ref=e102]: Destructive — blocked entirely
          - paragraph [ref=e103]: Plugin refuses, explains why, and suggests a safer alternative. Not a warning — a hard block.
          - generic [ref=e104]: rm -rf / · dd if=/dev/zero · mkfs.* · shred · wipefs · DROP TABLE · userdel -r
      - link "Full security model →" [ref=e106] [cursor=pointer]:
        - /url: security.html
