    - generic [ref=e59]: // What it does
    - heading "SRE intelligence, built into Claude Code" [level=2] [ref=e60]
    - paragraph [ref=e61]: Not a chatbot. A structured mental model — the way a seasoned Linux administrator thinks when something breaks at 2 AM.
    - generic [ref=e62]:
      - generic [ref=e63]:
        - generic [ref=e64]: 🔍
        - generic [ref=e65]: Read-only-first diagnostics
        - paragraph [ref=e66]: Gathers evidence before touching anything. Follows the observe → hypothesize → verify → fix loop every senior SRE uses. No destructive action runs before you have a diagnosis.
      - generic [ref=e67]:
        - generic [ref=e68]: 🐧
        - generic [ref=e69]: Distro-aware command selection
        - paragraph [ref=e70]: Detects Ubuntu, RHEL, Fedora, SUSE, Arch. Uses the right package manager and service manager for each.
      - generic [ref=e71]:
        - generic [ref=e72]: 🛡️
        - generic [ref=e73]: Safety gates on destructive commands
        - paragraph [ref=e74]: PreToolUse hook classifies every command. Class 3 (rm -rf, dd, mkfs) is blocked. Class 2 requires explicit confirmation.
      - generic [ref=e75]:
        - generic [ref=e76]: 🎯
        - generic [ref=e77]: Evidence-based root-cause analysis
        - paragraph [ref=e78]: No guessing. Chases the error through logs, service dependencies, kernel messages, and config files.
      - generic [ref=e79]:
        - generic [ref=e80]: ⚡
        - generic [ref=e81]: 30+ task-specific skills
        - paragraph [ref=e82]: Expert modules for sysctl, systemd, nftables, LVM, kdump, SSSD, PAM, ACLs, and more.
      - generic [ref=e83]:
        - generic [ref=e84]: 🤖
        - generic [ref=e85]: Multi-agent platform support
        - paragraph [ref=e86]: Claude Code native. Adapters for Codex (AGENTS.md) and Gemini (GEMINI.md) included. Works wherever your AI agent runs.
  - region "Safety model" [ref=e87]:
    - generic [ref=e88]:
      - generic [ref=e89]: // Command safety
      - heading "Three-class protection model" [level=2] [ref=e90]
      - paragraph [ref=e91]: Every shell command passes through a classification gate before execution. No exceptions.
      - generic [ref=e92]:
        - generic [ref=e93]:
          - generic [ref=e94]: Class R/O
          - generic [ref=e95]: Read-only — instant pass
          - paragraph [ref=e96]: Diagnostic commands run immediately with zero friction. Evidence collection has no gating.
          - generic [ref=e97]: cat · journalctl · systemctl status · ss · ip · df · du · ps · lsof · dmesg
        - generic [ref=e98]:
          - generic [ref=e99]: Class 2
          - generic [ref=e100]: Disruptive — confirm required
          - paragraph [ref=e101]: Command halts. Warning is shown. User must type 'yes' to proceed. Never skipped.
          - generic [ref=e102]: systemctl stop · systemctl restart · firewall-cmd · sysctl -w · mount · iptables -A
        - generic [ref=e103]:
          - generic [ref=e104]: Class 3
          - generic [ref=e105]: Destructive — blocked entirely
          - paragraph [ref=e106]: Plugin refuses, explains why, and suggests a safer alternative. Not a warning — a hard block.
          - generic [ref=e107]: rm -rf / · dd if=/dev/zero · mkfs.* · shred · wipefs · DROP TABLE · userdel -r
