      - heading "Seven Inviolable Principles" [level=2] [ref=e48]
      - paragraph [ref=e49]: These constraints are not configurable. They are baked into every skill and enforced by the hook layer before any command runs.
    - generic [ref=e50]:
      - generic [ref=e51]:
        - generic [ref=e52]: 🔍
        - generic [ref=e53]: Read-only first
        - generic [ref=e54]: Gather evidence before any change suggestion. No command is recommended before diagnostic data is collected and reviewed.
      - generic [ref=e55]:
        - generic [ref=e56]: 📋
        - generic [ref=e57]: Evidence before change
        - generic [ref=e58]: Root cause must be confirmed, not guessed. A hypothesis is not a diagnosis. Only confirmed root causes justify a change recommendation.
      - generic [ref=e59]:
        - generic [ref=e60]: 🚫
        - generic [ref=e61]: No blind tuning
        - generic [ref=e62]: Never suggest sysctl, ulimit, or kernel parameter changes without supporting evidence from observed system behaviour.
      - generic [ref=e63]:
        - generic [ref=e64]: ⚠️
        - generic [ref=e65]: No destructive command without confirmation
        - generic [ref=e66]: Class 2 commands always halt for an explicit user confirmation before the plugin proceeds. No exceptions.
      - generic [ref=e67]:
        - generic [ref=e68]: 💾
        - generic [ref=e69]: Backup before migration
        - generic [ref=e70]: No cutover is recommended without a confirmed backup. Migration plans that skip the backup step are rejected outright.
      - generic [ref=e71]:
        - generic [ref=e72]: 🔄
        - generic [ref=e73]: Rollback before cutover
