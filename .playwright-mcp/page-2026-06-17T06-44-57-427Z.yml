    - generic [ref=e67]: // What it does
    - heading "SRE intelligence, built into Claude Code" [level=2] [ref=e68]
    - paragraph [ref=e69]: Not a chatbot. A structured mental model — the way a seasoned Linux administrator thinks when something breaks at 2 AM.
    - generic [ref=e70]:
      - generic [ref=e71]:
        - generic [ref=e72]: 🔍
        - generic [ref=e73]: Read-only-first diagnostics
        - paragraph [ref=e74]: Gathers evidence before touching anything. Follows the observe → hypothesize → verify → fix loop every senior SRE uses.
      - generic [ref=e75]:
        - generic [ref=e76]: 🐧
        - generic [ref=e77]: Distro-aware command selection
        - paragraph [ref=e78]: Detects Ubuntu/Debian, RHEL/CentOS, Fedora, SUSE, Arch. Uses the right package manager, service manager, and file paths for each.
      - generic [ref=e79]:
        - generic [ref=e80]: 🛡️
        - generic [ref=e81]: Safety gates on destructive commands
        - paragraph [ref=e82]: PreToolUse hook classifies every command. Class 3 (rm -rf, dd, mkfs) is blocked. Class 2 (systemctl stop, firewall changes) requires explicit confirmation.
      - generic [ref=e83]:
        - generic [ref=e84]: 🎯
        - generic [ref=e85]: Evidence-based root-cause analysis
        - paragraph [ref=e86]: No guessing. Chases the actual error back through logs, service dependencies, kernel messages, and config files to find the true root cause.
      - generic [ref=e87]:
        - generic [ref=e88]: ⚡
        - generic [ref=e89]: 30+ task-specific skills
        - paragraph [ref=e90]: Deep-dive expert modules for sysctl, systemd, nftables, fail2ban, LVM, kdump, SSSD, PAM, ACLs, and more. Each is a focused specialist.
      - generic [ref=e91]:
        - generic [ref=e92]: 🤖
        - generic [ref=e93]: Multi-agent platform support
        - paragraph [ref=e94]: Claude Code native. Adapters for Codex (AGENTS.md) and Gemini (GEMINI.md) included. Works wherever your AI agent runs.
  - region "Safety model" [ref=e95]:
    - generic [ref=e96]:
      - generic [ref=e97]: // Command safety
      - heading "Three-class protection model" [level=2] [ref=e98]
      - paragraph [ref=e99]: Every shell command passes through a classification gate before execution. No exceptions.
      - generic [ref=e100]:
        - generic [ref=e101]:
          - generic [ref=e102]: Class R/O
          - generic [ref=e103]: Read-only — instant pass
          - paragraph [ref=e104]: Diagnostic commands run immediately with zero friction. Evidence collection has no gating.
          - generic [ref=e105]: cat · journalctl · systemctl status · ss · ip · df · du · ps · lsof · dmesg
        - generic [ref=e106]:
          - generic [ref=e107]: Class 2
          - generic [ref=e108]: Disruptive — confirm required
          - paragraph [ref=e109]: Command halts. Warning is shown. User must type 'yes' to proceed. Never skipped.
          - generic [ref=e110]: systemctl stop · systemctl restart · firewall-cmd · sysctl -w · mount · iptables -A
        - generic [ref=e111]:
          - generic [ref=e112]: Class 3
          - generic [ref=e113]: Destructive — blocked entirely
          - paragraph [ref=e114]: Plugin refuses, explains why, and suggests a safer alternative. Not a warning — a hard block.
          - generic [ref=e115]: rm -rf / · dd if=/dev/zero · mkfs.* · shred · wipefs · DROP TABLE · userdel -r
